services:
  mysql:
    image: mysql:8.4
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "--protocol=tcp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  server:
    build: ./backend
    container_name: node-server
    restart: always

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: vue-frontend
    restart: always

    ports:
      - "5173:5173"

    env_file:
      - .env

    depends_on:
      - server

    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data: